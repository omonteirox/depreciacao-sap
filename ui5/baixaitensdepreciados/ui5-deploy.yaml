# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: assy.gm.baixadepreciacao.baixaitensdepreciados
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          url: https://my419883.s4hana.cloud.sap/
          authenticationType: reentranceTicket # SAML support for vscode
        app:
          name: ZASSYDEPRECIACA
          description: depreciacao
          package: ZASSYDEPRECIACAO
          transport: MLDK903792
        exclude:
          - /test/
